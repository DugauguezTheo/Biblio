<h1>Liste des collections</h1>

<form (submit)="addCollection()" [formGroup]="formCollection">
    <div class="mb-3 row">
        <label for="nom" class="col-sm-2 col-form-label">Nom</label>
        <div class="col-sm-10">
            <input type="text" class="form-control" id="nom" formControlName="nom" [class.is-invalid]="formNomCtrl.invalid" />
            <div *ngIf="formNomCtrl.hasError('required')" class="invalid-feedback">Le nom est obligatoire</div>
        </div>
    </div>

    <div>
        <input [disabled]="formCollection.invalid" type="submit" class="btn btn-success" value="Ajouter" />
    </div>
</form>

<hr />

<table class="table table-striped">
    <thead>
        <tr>
            <th>ID</th>
            <th>Nom</th>
            <th></th>
        </tr>
    </thead>

    <tbody>
        <tr *ngFor="let collection of collections$ | async">
            <td>{{ collection.id }}</td>
            <td>{{ collection.nom }}</td>
            <td>
                <button class="btn btn-danger" (click)="deleteCollection(collection)">Supprimer</button>
            </td>
        </tr>
    </tbody>
</table>
